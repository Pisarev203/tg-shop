<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MSV SHOP</title>

<style>
:root{
  --bg:#0e1411;
  --card:#1a2420;
  --accent:#2e7d5b;
  --accent2:#3fa37a;
  --text:#e8f2ec;
  --muted:#8fa39a;
  --line:rgba(255,255,255,.06);
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.wrap{padding:12px}

.products{
  display:grid;
  gap:12px;
}

.p{
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--line);
}

.p img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.pb{padding:12px}

.pname{
  font-weight:800;
  font-size:16px;
}

.price{
  font-weight:900;
}

button{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  padding:10px;
  border-radius:12px;
  color:#fff;
  font-weight:800;
  width:100%;
}

.sidebar{
  display:flex;
  gap:8px;
  margin-bottom:10px;
  overflow:auto;
}

.cat{
  background:#1f2b26;
  padding:8px 12px;
  border-radius:12px;
  white-space:nowrap;
  cursor:pointer;
  border:1px solid var(--line);
}

.cat.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}

/* МОДАЛКА */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:var(--card);
  width:90%;
  max-width:500px;
  border-radius:20px;
  padding:16px;
}

.modal img{
  width:100%;
  border-radius:12px;
}

.close{
  background:#2a3732;
  padding:6px 12px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">

<div class="sidebar" id="cats"></div>

<div class="products" id="grid"></div>

</div>

<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="modal-content">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px">
      <div id="mTitle"></div>
      <div class="close" data-close="1">Закрыть</div>
    </div>

    <img id="mImg">

    <div id="mPrice" style="margin-top:10px"></div>
  </div>
</div>

<script>
let products=[];
let currentCat="all";

async function load(){
  const r=await fetch("/api/products");
  products=await r.json();
  renderCats();
  render();
}

function renderCats(){
  const cats=["all",...new Set(products.map(p=>p.category||"без категории"))];

  catsEl.innerHTML=cats.map(c=>`
    <div class="cat ${c===currentCat?'active':''}" onclick="setCat('${c}')">
      ${c}
    </div>
  `).join("");
}

function setCat(c){
  currentCat=c;
  renderCats();
  render();
}

function render(){
  const list=currentCat==="all"
    ?products
    :products.filter(p=>p.category===currentCat);

  grid.innerHTML=list.map(p=>`
    <div class="p" onclick="openProduct(${p.id})">
      <img src="${p.image}">
      <div class="pb">
        <div class="pname">${p.name}</div>
        <div class="price">${p.price} ₽</div>
        <button>Добавить</button>
      </div>
    </div>
  `).join("");
}

function openProduct(id){
  const p=products.find(x=>x.id===id);
  modal.style.display="flex";
  mTitle.innerText=p.name;
  mImg.src=p.image;
  mPrice.innerText=p.price+" ₽";
}

function closeModal(e){
  if(e.target.dataset.close || e.target.id==="modal"){
    modal.style.display="none";
  }
}

const catsEl=document.getElementById("cats");
const grid=document.getElementById("grid");
const modal=document.getElementById("modal");
const mTitle=document.getElementById("mTitle");
const mImg=document.getElementById("mImg");
const mPrice=document.getElementById("mPrice");

load();
</script>

</body>
</html>
