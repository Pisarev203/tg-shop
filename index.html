<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>MSV Shop</title>
  <style>
    :root{
      --bg:#101411;
      --bg-2:#151b17;
      --card:#1b221e;
      --card-2:#212924;
      --text:#edf3ee;
      --muted:#97a59c;
      --line:rgba(182, 206, 191, .12);
      --accent:#2f6f52;
      --accent-2:#498268;
      --accent-soft:rgba(73,130,104,.17);
      --danger:#b85b68;
      --danger-soft:rgba(184,91,104,.16);
      --good:#8ed6a7;
      --shadow:0 18px 44px rgba(0,0,0,.28);
      --radius:22px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(73,130,104,.16), transparent 26%),
        radial-gradient(circle at bottom left, rgba(73,130,104,.08), transparent 22%),
        var(--bg);
      padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    h1,h2,h3,p{margin:0}
    img{display:block;max-width:100%}
    button,input{font:inherit}
    button{cursor:pointer;border:0}

    .wrap{max-width:1460px;margin:0 auto;padding:12px 12px 22px}
    @media(min-width:720px){.wrap{padding:16px 16px 28px}}

    .top{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 16px;border-radius:28px;border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      box-shadow:var(--shadow);margin-bottom:12px;
      backdrop-filter:blur(8px);
    }
    .brandTitle{font-size:22px;font-weight:900;letter-spacing:.02em}
    .brandSub{font-size:13px;color:var(--muted);margin-top:4px}
    .topActions{display:flex;gap:8px;flex-wrap:wrap}

    .btn,.ghost,.danger,input,.menuBtn,.chip,.qtyBtn,.iconBtn,.closeBtn{
      min-height:46px;border-radius:16px;
    }
    .btn,.ghost,.danger,.menuBtn,.chip,.qtyBtn,.iconBtn,.closeBtn{padding:0 14px;font-weight:800}
    .btn{
      color:#fff;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      box-shadow:0 10px 22px rgba(47,111,82,.22);
    }
    .ghost,.qtyBtn,.iconBtn,.closeBtn{
      color:var(--text);
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
    }
    .danger{color:#ffd7dc;background:var(--danger-soft);border:1px solid rgba(184,91,104,.34)}
    input{
      width:100%;padding:0 14px;border:1px solid var(--line);
      background:rgba(0,0,0,.18);color:var(--text);outline:none;
    }
    input::placeholder{color:#839189}

    .layout{display:grid;gap:12px}
    @media(min-width:1180px){.layout{grid-template-columns:300px minmax(0,1fr) 360px;align-items:start}}

    .panel{
      border:1px solid var(--line);border-radius:var(--radius);padding:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      box-shadow:var(--shadow);
    }
    .panelTitle{
      font-size:13px;font-weight:800;color:var(--muted);
      text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;
    }

    .side,.content,.cartSide{display:grid;gap:12px}
    @media(min-width:1180px){.side,.cartSide{position:sticky;top:16px}}

    .accountBox{display:grid;gap:10px}
    .accountName{font-size:20px;font-weight:900}
    .field{display:grid;gap:7px}
    .fieldLabel{font-size:12px;color:var(--muted)}

    .menuList{display:grid;gap:8px}
    .menuBtn{
      width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
      color:var(--text);text-align:left;background:rgba(255,255,255,.03);border:1px solid var(--line);
    }
    .menuBtn.active{
      background:linear-gradient(135deg, rgba(47,111,82,.32), rgba(73,130,104,.22));
      border-color:rgba(115,177,143,.28);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
    }
    .menuCount{font-size:13px;color:#c5dfcf}

    .hero{
      display:grid;gap:12px;padding:16px;border-radius:28px;border:1px solid var(--line);
      background:
        radial-gradient(circle at top right, rgba(73,130,104,.22), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      box-shadow:var(--shadow);
    }
    .heroTop{display:flex;justify-content:space-between;align-items:flex-end;gap:10px}
    .heroTitle{font-size:clamp(24px,4vw,34px);font-weight:900;line-height:1.02}
    .heroCount{font-size:14px;color:var(--muted)}
    .tools{display:grid;gap:10px}
    @media(min-width:760px){.tools{grid-template-columns:1fr auto}}
    .chips{display:flex;gap:8px;overflow:auto;padding-bottom:2px}
    .chips::-webkit-scrollbar{display:none}
    .chip{
      white-space:nowrap;color:var(--text);background:rgba(255,255,255,.035);border:1px solid var(--line);
    }
    .chip.active{background:var(--accent-soft);border-color:rgba(115,177,143,.28)}

    .products{display:grid;gap:12px;grid-template-columns:1fr}
    @media(min-width:700px){.products{grid-template-columns:1fr 1fr}}
    @media(min-width:980px){.products{grid-template-columns:1fr 1fr 1fr}}

    .product{
      border:1px solid var(--line);border-radius:26px;overflow:hidden;background:rgba(0,0,0,.18);
      transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
      box-shadow:0 10px 24px rgba(0,0,0,.14);cursor:pointer;
    }
    .product:hover{border-color:rgba(115,177,143,.26);box-shadow:0 18px 32px rgba(0,0,0,.2)}
    .product:active{transform:scale(.995)}
    .productMedia{
      aspect-ratio:1 / 1;background:#171d1a;display:flex;align-items:center;justify-content:center;
      overflow:hidden;padding:10px;
    }
    .productMedia img{
      width:100%;height:100%;object-fit:cover;border-radius:18px;background:transparent;
    }
    .emptyPhoto{
      width:100%;height:100%;border-radius:18px;background:rgba(255,255,255,.03);
      display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;
    }
    .productBody{padding:14px;display:grid;gap:10px}
    .titleRow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .productName{font-size:18px;font-weight:900;line-height:1.18}
    .price{font-size:18px;font-weight:900;white-space:nowrap}
    .desc{font-size:14px;color:var(--muted);line-height:1.35;min-height:38px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .badgeRow{display:flex;gap:7px;flex-wrap:wrap}
    .badge{
      display:inline-flex;align-items:center;gap:6px;max-width:100%;padding:7px 10px;border-radius:999px;
      background:var(--accent-soft);color:#d0ead8;font-size:12px;font-weight:800;
    }
    .badge.dark{background:rgba(255,255,255,.05);color:#dbe4de}
    .ctaRow{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .countCircle{
      min-width:42px;height:42px;border-radius:999px;display:flex;align-items:center;justify-content:center;
      color:#d8f1e2;background:rgba(73,130,104,.16);border:1px solid rgba(115,177,143,.2);font-weight:900;
    }

    .emptyState{padding:16px;border:1px dashed var(--line);border-radius:22px;color:var(--muted);text-align:center}

    .cartList{display:grid;gap:10px}
    .cartItem{border:1px solid var(--line);border-radius:18px;padding:12px;background:rgba(0,0,0,.16);display:grid;gap:8px}
    .cartTitle{font-weight:900}
    .cartMuted{font-size:12px;color:var(--muted)}
    .qtyRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .qtyBtn{min-width:40px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--text)}
    .cartFooter{display:grid;gap:12px}
    .totalBox{display:flex;justify-content:space-between;align-items:flex-end;gap:8px}
    .totalLabel{font-size:13px;color:var(--muted)}
    .totalValue{font-size:30px;font-weight:900}
    .stackBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .err{font-size:13px;color:#ffcad2;white-space:pre-line}

    .overlay{
      position:fixed;inset:0;background:rgba(4,8,6,.76);backdrop-filter:blur(10px);
      display:none;align-items:flex-end;justify-content:center;padding:12px;z-index:70;
    }
    .overlay.show{display:flex}
    .modal{
      width:min(960px,100%);max-height:min(92vh,900px);overflow:auto;padding:14px;
      border-radius:28px;border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(27,34,30,.98), rgba(15,20,17,.98));
      box-shadow:0 30px 70px rgba(0,0,0,.42);
    }
    .modalHead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    .modalGrid{display:grid;gap:14px}
    @media(min-width:760px){.modalGrid{grid-template-columns:1.05fr .95fr;align-items:start}}
    .modalMedia{min-height:320px;border-radius:22px;background:#171d1a;padding:10px;overflow:hidden}
    .modalMedia img{width:100%;height:100%;object-fit:contain;border-radius:18px;background:transparent}
    .modalInfo{display:grid;gap:12px}
    .modalName{font-size:clamp(28px,4vw,42px);font-weight:900;line-height:1.04}
    .modalPrice{font-size:36px;font-weight:900}
    .modalDesc{font-size:17px;line-height:1.45;color:#d6e0d9}
    .modalActions{display:flex;gap:8px;flex-wrap:wrap}
    .closeBtn{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--text)}

    .mobileBar{display:flex;gap:8px}
    @media(min-width:1180px){.mobileBar{display:none}}

    .drawer{
      position:fixed;inset:0;background:rgba(4,8,6,.74);backdrop-filter:blur(8px);display:none;z-index:65;
      padding:12px;
    }
    .drawer.show{display:block}
    .drawerCard{
      max-width:420px;width:100%;height:100%;max-height:100%;overflow:auto;
      background:linear-gradient(180deg, rgba(27,34,30,.98), rgba(15,20,17,.98));
      border:1px solid var(--line);border-radius:28px;padding:14px;box-shadow:var(--shadow);
    }
    .drawerHead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}

    @media(max-width:1179px){
      #leftSide{display:none}
      #leftSide.mobileVisible{display:grid}
      .desktopOnly{display:none}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <div class="brandTitle">MSV Shop</div>
        <div class="brandSub">Каталог, разделы, акции, корзина и карточка товара</div>
      </div>
      <div class="topActions">
        <button class="ghost mobileBar" id="showMenuBtn">Разделы и профиль</button>
        <button class="ghost" id="reloadBtn">Обновить</button>
      </div>
    </header>

    <div class="layout">
      <aside class="side" id="leftSide">
        <section class="panel">
          <div class="panelTitle">Мой аккаунт</div>
          <div class="accountBox">
            <div>
              <div class="accountName" id="accountName">Гость</div>
              <div class="fieldLabel">Данные сохраняются на этом устройстве</div>
            </div>
            <label class="field">
              <span class="fieldLabel">Telegram юзер</span>
              <input id="tgUser" placeholder="@username"/>
            </label>
            <label class="field">
              <span class="fieldLabel">Метро</span>
              <input id="metro" placeholder="Напр. Таганская"/>
            </label>
            <label class="field">
              <span class="fieldLabel">Время доставки</span>
              <input id="time" placeholder="Напр. Сегодня 18:30"/>
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panelTitle">Разделы</div>
          <div class="menuList" id="menu"></div>
        </section>
      </aside>

      <main class="content">
        <section class="hero">
          <div class="heroTop">
            <div>
              <div class="panelTitle" style="margin-bottom:6px">Каталог</div>
              <div class="heroTitle" id="catalogTitle">Все товары</div>
            </div>
            <div class="heroCount" id="catalogCount">0 товаров</div>
          </div>

          <div class="tools">
            <input id="searchEl" placeholder="Поиск по названию, описанию, разделу или акции"/>
            <div class="chips" id="chips"></div>
          </div>
        </section>

        <section class="products" id="grid"></section>
        <div class="emptyState" id="empty" style="display:none"></div>
      </main>

      <aside class="panel cartSide">
        <div class="panelTitle">Корзина</div>
        <div class="cartList" id="cartBox"></div>
        <div class="cartFooter">
          <div class="totalBox">
            <div>
              <div class="totalLabel">Итого</div>
              <div class="totalValue" id="totalEl">0 ₽</div>
            </div>
          </div>
          <div class="stackBtns">
            <button class="danger" id="clearBtn">Очистить</button>
            <button class="btn" id="orderBtn">Оформить</button>
          </div>
          <div class="err" id="orderErr"></div>
        </div>
      </aside>
    </div>
  </div>

  <div class="drawer" id="drawer">
    <div class="drawerCard">
      <div class="drawerHead">
        <div class="panelTitle" style="margin:0">Разделы и профиль</div>
        <button class="closeBtn" id="closeDrawerBtn">Закрыть</button>
      </div>
      <div id="drawerContent"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal" id="modal">
      <div class="modalHead">
        <div>
          <div class="panelTitle" style="margin-bottom:6px">Товар</div>
          <div class="modalName" id="mName">Товар</div>
        </div>
        <button class="closeBtn" id="closeModalBtn">Закрыть</button>
      </div>
      <div class="modalGrid">
        <div class="modalMedia" id="mImageBox"></div>
        <div class="modalInfo">
          <div class="modalPrice" id="mPrice">0 ₽</div>
          <div class="badgeRow">
            <div class="badge dark" id="mCategory" style="display:none"></div>
            <div class="badge" id="mPromo" style="display:none"></div>
          </div>
          <div class="modalDesc" id="mDesc"></div>
          <div class="modalActions">
            <button class="btn" id="mAdd">Добавить в корзину</button>
            <button class="ghost" id="mPlus">+1</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let products = [];
    let cart = {};
    let currentProductId = null;
    let currentCategory = 'all';
    let searchText = '';

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const menu = document.getElementById('menu');
    const chips = document.getElementById('chips');
    const searchEl = document.getElementById('searchEl');
    const catalogTitle = document.getElementById('catalogTitle');
    const catalogCount = document.getElementById('catalogCount');

    const accountName = document.getElementById('accountName');
    const tgUserEl = document.getElementById('tgUser');
    const metroEl = document.getElementById('metro');
    const timeEl = document.getElementById('time');

    const cartBox = document.getElementById('cartBox');
    const totalEl = document.getElementById('totalEl');
    const orderErr = document.getElementById('orderErr');
    const clearBtn = document.getElementById('clearBtn');
    const orderBtn = document.getElementById('orderBtn');
    const reloadBtn = document.getElementById('reloadBtn');

    const overlay = document.getElementById('overlay');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const mName = document.getElementById('mName');
    const mPrice = document.getElementById('mPrice');
    const mCategory = document.getElementById('mCategory');
    const mPromo = document.getElementById('mPromo');
    const mDesc = document.getElementById('mDesc');
    const mImageBox = document.getElementById('mImageBox');
    const mAdd = document.getElementById('mAdd');
    const mPlus = document.getElementById('mPlus');

    const drawer = document.getElementById('drawer');
    const drawerContent = document.getElementById('drawerContent');
    const showMenuBtn = document.getElementById('showMenuBtn');
    const closeDrawerBtn = document.getElementById('closeDrawerBtn');
    const leftSide = document.getElementById('leftSide');

    function money(n){ return Number(n || 0) + ' ₽'; }

    function saveProfile(){
      localStorage.setItem('shop_profile', JSON.stringify({
        tg_user: tgUserEl.value || '',
        metro: metroEl.value || '',
        time: timeEl.value || ''
      }));
      updateAccountName();
    }

    function loadProfile(){
      try{
        const saved = JSON.parse(localStorage.getItem('shop_profile') || '{}');
        tgUserEl.value = saved.tg_user || '';
        metroEl.value = saved.metro || '';
        timeEl.value = saved.time || '';
      }catch(e){}
      updateAccountName();
    }

    function updateAccountName(){
      const tg = (tgUserEl.value || '').trim();
      accountName.textContent = tg || 'Гость';
    }

    function promoLabel(p){
      if(p.promo_type === 'bogo') return p.promo_text || '1+1';
      if(p.promo_type === 'gift') return p.promo_text || 'Подарок к товару';
      return '';
    }

    function categoryName(p){
      return String(p.category || 'Без раздела').trim() || 'Без раздела';
    }

    function getCategories(){
      const map = new Map();
      for(const p of products){
        const cat = categoryName(p);
        map.set(cat, (map.get(cat) || 0) + 1);
      }
      return Array.from(map.entries())
        .sort((a,b)=>a[0].localeCompare(b[0], 'ru'))
        .map(([name,count])=>({name,count}));
    }

    function productMatches(p){
      const q = searchText.trim().toLowerCase();
      const categoryOk = currentCategory === 'all' || categoryName(p) === currentCategory;
      if(!categoryOk) return false;
      if(!q) return true;

      const haystack = [
        p.name,
        p.description,
        p.category,
        p.promo_text,
        promoLabel(p)
      ].join(' ').toLowerCase();

      return haystack.includes(q);
    }

    function getVisibleProducts(){
      return products.filter(productMatches);
    }

    function getCartItems(){
      return Object.entries(cart).map(([id, qty])=>{
        const p = products.find(x => String(x.id) === String(id));
        return p ? {p, qty:Number(qty)} : null;
      }).filter(Boolean);
    }

    function calcItemTotal(p, qty){
      const price = Number(p.price || 0);
      if(p.promo_type === 'bogo'){
        const chargeableQty = qty - Math.floor(qty / 2);
        return chargeableQty * price;
      }
      return qty * price;
    }

    function calcCartTotal(){
      return getCartItems().reduce((sum, item)=>sum + calcItemTotal(item.p, item.qty), 0);
    }

    function cartPayload(){
      return getCartItems().map(({p, qty})=>({
        id: p.id,
        name: p.name,
        price: p.price,
        qty,
        promo_type: p.promo_type || 'none',
        promo_text: p.promo_text || ''
      }));
    }

    async function loadProducts(){
      orderErr.textContent = '';
      try{
        const r = await fetch('/api/products', {cache:'no-store'});
        const txt = await r.text();
        if(!r.ok) throw new Error(txt);
        const data = JSON.parse(txt);
        products = Array.isArray(data) ? data : (data.products || []);
        render();
      }catch(e){
        console.error(e);
        grid.innerHTML = '';
        empty.style.display = 'block';
        empty.textContent = 'Не удалось загрузить товары';
        orderErr.textContent = 'Ошибка загрузки: ' + e.message;
      }
    }

    function renderMenu(){
      const categories = getCategories();
      menu.innerHTML = `
        <button class="menuBtn ${currentCategory === 'all' ? 'active' : ''}" onclick="setCategory('all')">
          <span>Все товары</span>
          <span class="menuCount">${products.length}</span>
        </button>
      `;
      for(const cat of categories){
        menu.innerHTML += `
          <button class="menuBtn ${currentCategory === cat.name ? 'active' : ''}" data-category="${escapeHtml(cat.name)}" onclick="setCategory(this.dataset.category)">
            <span>${escapeHtml(cat.name)}</span>
            <span class="menuCount">${cat.count}</span>
          </button>
        `;
      }

      chips.innerHTML = `<button class="chip ${currentCategory === 'all' ? 'active' : ''}" onclick="setCategory('all')">Все</button>`;
      for(const cat of categories){
        chips.innerHTML += `<button class="chip ${currentCategory === cat.name ? 'active' : ''}" data-category="${escapeHtml(cat.name)}" onclick="setCategory(this.dataset.category)">${escapeHtml(cat.name)}</button>`;
      }
    }

    function render(){
      renderMenu();
      const visible = getVisibleProducts();
      grid.innerHTML = '';

      catalogTitle.textContent = currentCategory === 'all' ? 'Все товары' : currentCategory;
      catalogCount.textContent = visible.length + ' товаров';

      empty.style.display = visible.length ? 'none' : 'block';
      empty.textContent = products.length
        ? 'Ничего не найдено. Попробуй другой запрос или раздел.'
        : 'Пока нет товаров. Добавь их в админке.';

      for(const p of visible){
        const inCart = cart[p.id] || 0;
        const img = String((p.image || p.photo || '')).trim();
        const promo = promoLabel(p);

        grid.innerHTML += `
          <article class="product" onclick="openProduct(${p.id})">
            <div class="productMedia">
              ${img ? `<img src="${escapeHtml(img)}" alt="">` : `<div class="emptyPhoto">Нет фото</div>`}
            </div>
            <div class="productBody">
              <div class="badgeRow">
                <div class="badge dark">${escapeHtml(categoryName(p))}</div>
                ${promo ? `<div class="badge">🔥 ${escapeHtml(promo)}</div>` : ''}
              </div>
              <div class="titleRow">
                <div class="productName">${escapeHtml(p.name)}</div>
                <div class="price">${money(p.price)}</div>
              </div>
              <div class="desc">${escapeHtml(p.description || '')}</div>
              <div class="ctaRow">
                <button class="${inCart ? 'ghost' : 'btn'}" onclick="event.stopPropagation(); addToCart(${p.id})">${inCart ? 'В корзине' : 'Добавить'}</button>
                ${inCart ? `<div class="countCircle">${inCart}</div>` : ''}
              </div>
            </div>
          </article>
        `;
      }

      renderCart();
    }

    function renderCart(){
      cartBox.innerHTML = '';
      const items = getCartItems();
      let total = 0;

      if(!items.length){
        cartBox.innerHTML = `<div class="emptyState">Корзина пока пустая</div>`;
      }

      for(const it of items){
        const lineTotal = calcItemTotal(it.p, it.qty);
        total += lineTotal;

        let promoLine = '';
        if(it.p.promo_type === 'bogo'){
          const freeQty = Math.floor(it.qty / 2);
          promoLine = `<div class="cartMuted">Акция 1+1${freeQty > 0 ? ` · бесплатно: ${freeQty}` : ''}</div>`;
        }else if(it.p.promo_type === 'gift'){
          promoLine = `<div class="cartMuted">🎁 Подарок: ${escapeHtml(it.p.promo_text || 'Подарок к товару')}</div>`;
        }

        cartBox.innerHTML += `
          <div class="cartItem">
            <div class="titleRow">
              <div>
                <div class="cartTitle">${escapeHtml(it.p.name)}</div>
                ${promoLine}
              </div>
              <div class="price">${money(lineTotal)}</div>
            </div>
            <div class="qtyRow">
              <button class="qtyBtn" onclick="dec(${it.p.id})">-</button>
              <b>${it.qty}</b>
              <button class="qtyBtn" onclick="inc(${it.p.id})">+</button>
              <button class="danger" onclick="removeItem(${it.p.id})">Удалить</button>
            </div>
          </div>
        `;
      }

      totalEl.textContent = money(total);
    }

    function setCategory(category){
      currentCategory = category || 'all';
      render();
      closeDrawer();
    }

    function openProduct(id){
      const p = products.find(x => String(x.id) === String(id));
      if(!p) return;

      currentProductId = p.id;
      mName.textContent = p.name || 'Товар';
      mPrice.textContent = money(p.price);
      mDesc.textContent = p.description || 'Описание скоро добавим';

      if(p.category){
        mCategory.style.display = 'inline-flex';
        mCategory.textContent = p.category;
      }else{
        mCategory.style.display = 'none';
      }

      const promo = promoLabel(p);
      if(promo){
        mPromo.style.display = 'inline-flex';
        mPromo.textContent = '🔥 ' + promo;
      }else{
        mPromo.style.display = 'none';
      }

      const img = String((p.image || p.photo || '')).trim();
      mImageBox.innerHTML = img
        ? `<img src="${escapeHtml(img)}" alt="">`
        : `<div class="emptyPhoto">Нет фото</div>`;

      overlay.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeProduct(event){
      if(event){
        const target = event.target;
        const clickedOverlay = target === overlay;
        const clickedClose = target === closeModalBtn || target.closest('#closeModalBtn');
        if(!clickedOverlay && !clickedClose) return;
      }
      overlay.classList.remove('show');
      document.body.style.overflow = '';
    }

    function addToCart(id){ cart[id] = (cart[id] || 0) + 1; render(); }
    function inc(id){ cart[id] = (cart[id] || 0) + 1; render(); }
    function dec(id){ cart[id] = (cart[id] || 0) - 1; if(cart[id] <= 0) delete cart[id]; render(); }
    function removeItem(id){ delete cart[id]; render(); }

    function openDrawer(){
      drawerContent.innerHTML = leftSide.innerHTML;
      drawer.classList.add('show');
      document.body.style.overflow = 'hidden';
      bindDrawerInputs();
    }

    function closeDrawer(){
      drawer.classList.remove('show');
      if(!overlay.classList.contains('show')) document.body.style.overflow = '';
    }

    function bindDrawerInputs(){
      const dtg = drawerContent.querySelector('#tgUser');
      const dmetro = drawerContent.querySelector('#metro');
      const dtime = drawerContent.querySelector('#time');
      if(dtg){
        dtg.value = tgUserEl.value;
        dmetro.value = metroEl.value;
        dtime.value = timeEl.value;
        dtg.addEventListener('input', ()=>{tgUserEl.value = dtg.value; saveProfile();});
        dmetro.addEventListener('input', ()=>{metroEl.value = dmetro.value; saveProfile();});
        dtime.addEventListener('input', ()=>{timeEl.value = dtime.value; saveProfile();});
      }
    }

    mAdd.onclick = ()=>{ if(currentProductId != null) addToCart(currentProductId); };
    mPlus.onclick = ()=>{ if(currentProductId != null) addToCart(currentProductId); };
    clearBtn.onclick = ()=>{ cart = {}; render(); };
    reloadBtn.onclick = loadProducts;
    closeModalBtn.onclick = closeProduct;
    overlay.onclick = closeProduct;
    showMenuBtn.onclick = openDrawer;
    closeDrawerBtn.onclick = closeDrawer;
    drawer.onclick = (e)=>{ if(e.target === drawer) closeDrawer(); };

    searchEl.addEventListener('input', ()=>{
      searchText = searchEl.value || '';
      render();
    });

    [tgUserEl, metroEl, timeEl].forEach(el => el.addEventListener('input', saveProfile));

    document.addEventListener('keydown', (e)=>{
      if(e.key === 'Escape'){
        closeProduct({target: overlay});
        closeDrawer();
      }
    });

    window.addEventListener('error', (ev)=>{
      console.error('JS ERROR:', ev.error || ev.message);
    });

    orderBtn.onclick = async ()=>{
      orderErr.textContent = '';
      const tgUser = (tgUserEl.value || '').trim();
      if(!tgUser){
        orderErr.textContent = 'Введи свой Telegram юз, например: @mike';
        return;
      }

      const items = cartPayload();
      if(items.length === 0){
        orderErr.textContent = 'Корзина пустая';
        return;
      }

      const total = calcCartTotal();

      try{
        const r = await fetch('/api/order', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            tg_user: tgUser,
            metro: metroEl.value,
            time: timeEl.value,
            items,
            total
          })
        });
        const data = await r.json().catch(()=>({}));
        if(!r.ok) throw new Error(data.error || data.detail || 'Ошибка заказа');

        alert('Заказ отправлен! #' + data.order_id);
        cart = {};
        closeProduct({target: overlay});
        render();
      }catch(e){
        orderErr.textContent = 'Ошибка оформления: ' + e.message;
        console.error(e);
      }
    };

    function escapeHtml(s){
      return String(s || '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }

    loadProfile();
    loadProducts();
  </script>
</body>
</html>
